notify:
  - platform: group
    name: tidbyt_once
    services:
      - service: tidbyt_kitchen_once
      - service: tidbyt_garage_once
      - service: tidbyt_katie_once
      - service: tronbyt_music_room_once
  - platform: group
    name: tidbyt_background
    services:
      - service: tidbyt_kitchen_background
      - service: tidbyt_garage_background
      - service: tidbyt_katie_background
      - service: tronbyt_music_room_background

  - name: tidbyt_garage_background
    platform: rest
    resource: http://pixlet:8080/api/v1/push
    method: POST_JSON
    message_param_name: msg
    data:
      installationID: push
      deviceID: icily-haloed-upright-thrasher-6dc
      apiToken: !env_var TIDBYT_GARAGE_API_TOKEN
      background: "true"

  - name: tidbyt_garage_once
    platform: rest
    resource: http://pixlet:8080/api/v1/push
    method: POST_JSON
    message_param_name: msg
    data:
      deviceID: icily-haloed-upright-thrasher-6dc
      apiToken: !env_var TIDBYT_GARAGE_API_TOKEN
      background: "false"

  - name: tidbyt_katie_background
    platform: rest
    resource: http://pixlet:8080/api/v1/push
    method: POST_JSON
    message_param_name: msg
    data:
      installationID: push
      deviceID: blithely-celebrated-lucid-grub-f33
      apiToken: !env_var TIDBYT_KATIE_API_TOKEN
      background: "true"

  - name: tidbyt_katie_once
    platform: rest
    resource: http://pixlet:8080/api/v1/push
    method: POST_JSON
    message_param_name: msg
    data:
      deviceID: blithely-celebrated-lucid-grub-f33
      apiToken: !env_var TIDBYT_KATIE_API_TOKEN
      background: "false"

  - name: tronbyt_music_room_background
    platform: rest
    resource: http://tronbyt:8000/v0/devices/music-room-tidbyt/push_app
    method: POST_JSON
    message_param_name: msg
    headers:
      Authorization: !env_var TRONBYT_MUSIC_ROOM_API_TOKEN
      Content-Type: application/json
    data:
      app_id: vertical-message
      background: True

  - name: tronbyt_music_room_once
    platform: rest
    resource: http://tronbyt:8000/v0/devices/music-room-tidbyt/push_app
    method: POST_JSON
    message_param_name: msg
    headers:
      Authorization: !env_var TRONBYT_MUSIC_ROOM_API_TOKEN
      Content-Type: application/json
    data:
      app_id: vertical-message

  - name: tidbyt_kitchen_once
    platform: rest
    resource: http://pixlet:8080/api/v1/push
    method: POST_JSON
    message_param_name: msg
    data:
      deviceID: internally-apt-kind-guinea-484
      apiToken: !env_var TIDBYT_KITCHEN_API_TOKEN
      background: "false"

  - name: tidbyt_kitchen_background
    platform: rest
    resource: http://pixlet:8080/api/v1/push
    method: POST_JSON
    message_param_name: msg
    data:
      installationID: push
      deviceID: internally-apt-kind-guinea-484
      apiToken: !env_var TIDBYT_KITCHEN_API_TOKEN
      background: "true"
