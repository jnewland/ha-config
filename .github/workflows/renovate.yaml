    branches:
      - main
  workflow_dispatch: {}
  schedule:
    - cron:  '0 */4 * * *'
jobs:
  renovate:
    uses: urcomputeringpal/.github/.github/workflows/renovate.yaml@afef16538729652381a4c15b8bf95656f9663cd0 # main
    with:
      renovate_app_slug: jnewland-renovate
    secrets:
      RENOVATE_APP_ID: ${{ secrets.RENOVATE_APP_ID }}
      RENOVATE_APP_PEM: ${{ secrets.RENOVATE_APP_PEM }}
