name: cd
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]
concurrency:
  group: cd-${{ github.event.pull_request.number || github.ref_name }}-${{ github.event_name }}
jobs:
  validate-config:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Generate fake SSL cert
        run: |
          openssl req -x509 -newkey rsa:2048 -subj '/CN=example.com' -nodes -keyout key.pem -out cert.pem
      - name: Test config
        uses: docker://homeassistant/home-assistant:2026.4.3@sha256:ae0800c81fea16bc1241ce03bddb9c6260566e90f58b09d3e5a629e4f68bdc0b
        with:
          entrypoint: ./script/cibuild

  update-branch:
    uses: jnewland/.github/.github/workflows/update-branch.yaml@71ce3f2d6f02ec9bd8c639a0602e7da75a3d0af1 # main
    with:
      pull_number: ${{ github.event.pull_request.number }}
    secrets:
      token: ${{ secrets.UR_BOT_TOKEN }}

  script-deploy:
    runs-on: ubuntu-latest
    needs: validate-config
    if: |
      github.event_name == 'push' ||
      ( github.event.action == 'labeled' && github.event.label.name == 'deploy') ||
      ( github.event.action != 'labeled' && contains(github.event.pull_request.labels.*.name, 'deploy') )
    environment: production
    concurrency: production
    steps:
      - name: deploy
        run: "true"

  create-deploy-status:
    runs-on: ubuntu-latest
    needs: script-deploy
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              ...context.repo,
              sha:         context.payload.pull_request.head.sha,
              state:       'success',
              context:     'deploy',
              description: 'PR was deployed with GitHub Actions',
              target_url:  'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });
